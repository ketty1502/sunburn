<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch</title>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
  }

  /* VIDEO COVER (no stretch, only crop) */
#video {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  opacity: 0;
  transition: opacity 0.8s ease;
}

#video iframe {
  width: 100%;
  height: 100%;
  max-width: 100vw;
  max-height: 100vh;
  aspect-ratio: 16 / 9;
  border: none;
}

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  #video.visible {
    opacity: 1;
  }

  /* Interaction blocker */
  #blocker {
    position: fixed;
    inset: 0;
    z-index: 5;
  }

  /* Start screen */
  #start {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
    cursor: pointer;
    z-index: 10;
    transition: opacity 0.8s;
  }

  #start.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* Play button */
  #btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
  }

  #start:hover #btn {
    transform: scale(1.08);
    border-color: #fff;
  }

  svg {
    width: 28px;
    height: 28px;
    fill: #fff;
    margin-left: 5px;
  }
</style>
</head>

<body>

<div id="video">
  <iframe id="frame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<div id="blocker"></div>

<div id="start">
  <div id="btn">
    <svg viewBox="0 0 24 24">
      <polygon points="6,3 20,12 6,21"/>
    </svg>
  </div>
</div>

 <div id="open-browser" style="
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 18px;
  background: rgba(0,0,0,0.7);
  color: white;
  border-radius: 8px;
  font-size: 14px;
  display: none;
  z-index: 20;
  cursor: pointer;
">
  Open in browser for full video
</div>

<script>
/* 🎬 RANDOM VIDEOS */
const VIDEOS = [
  "SsarK4y9eiI",
 "q6Wopu9epPs",
 "0oHx0qNNPHg",
"zCDNBlgdolk",
 "lSQyrOdU-sQ",
 "t9ziC4DHJ8I",
 "GctBsDh5vls",
 "uAURqr0o1QY",
 "xG2BMRAZpu4"
  
];

const VIDEO_ID = VIDEOS[Math.floor(Math.random() * VIDEOS.length)];

document.getElementById("start").addEventListener("click", () => {

  const iframe = document.getElementById("frame");

  iframe.src =
    "https://www.youtube.com/embed/" + VIDEO_ID +
    "?autoplay=1&mute=1&enablejsapi=1&loop=1&playlist=" + VIDEO_ID +
    "&controls=0&modestbranding=1&rel=0";

  document.getElementById("video").classList.add("visible");

  // 🔊 UNMUTE after a moment
  setTimeout(() => {
    iframe.contentWindow.postMessage(
      '{"event":"command","func":"unMute","args":""}',
      "*"
    );
  }, 2000);

  // remove start screen
  const s = document.getElementById("start");
  s.classList.add("hidden");
  setTimeout(() => s.remove(), 800);
});

 function forcePlay() {
  const iframe = document.getElementById("frame");

  if (iframe && iframe.contentWindow) {
    iframe.contentWindow.postMessage(
      '{"event":"command","func":"playVideo","args":""}',
      "*"
    );
  }
}

// Retry play multiple times (Instagram workaround)
setInterval(forcePlay, 1500);

// Also resume when user comes back to tab
document.addEventListener("visibilitychange", () => {
  if (!document.hidden) forcePlay();
});


function isInstagram() {
  return navigator.userAgent.toLowerCase().includes("instagram");
}

if (isInstagram()) {
  const btn = document.getElementById("open-browser");
  btn.style.display = "block";

  btn.addEventListener("click", () => {
    const url = window.location.href;

    // Try Android intent (opens Chrome)
    window.location.href =
      "intent://" + url.replace(/^https?:\/\//, "") +
      "#Intent;scheme=https;package=com.android.chrome;end";

    // Fallback (iOS)
    setTimeout(() => {
      window.open(url, "_blank");
    }, 500);
  });
}

</script>

</body>
</html>
