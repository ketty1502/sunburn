<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watch</title>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* Video wrapper */
    #player-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #player-wrap.visible {
      opacity: 1;
    }

    #player-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Invisible shield */
    #shield {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: none;
    }

    /* Start screen */
    #start-screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      cursor: pointer;
      transition: opacity 0.8s ease;
    }

    #start-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Play button */
    #play-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }

    #start-screen:hover #play-btn {
      border-color: #fff;
      transform: scale(1.08);
    }

    #play-btn svg {
      width: 28px;
      height: 28px;
      fill: #fff;
      margin-left: 5px;
    }
  </style>
</head>

<body>

<!-- Video -->
<div id="player-wrap">
  <div id="yt"></div>
</div>

<div id="shield"></div>

<!-- Start overlay -->
<div id="start-screen">
  <div id="play-btn">
    <svg viewBox="0 0 24 24">
      <polygon points="6,3 20,12 6,21"/>
    </svg>
  </div>
</div>

<script>
  const VIDEO_IDS = ["SsarK4y9eiI"];
  const id = VIDEO_IDS[Math.floor(Math.random() * VIDEO_IDS.length)];

  let player;
  let playerReady = false;
  let startRequested = false;

  // Load YouTube API safely
  function loadYouTubeAPI() {
    return new Promise((resolve) => {
      if (window.YT && window.YT.Player) {
        resolve();
      } else {
        const tag = document.createElement("script");
        tag.src = "https://www.youtube.com/iframe_api";
        window.onYouTubeIframeAPIReady = () => resolve();
        document.head.appendChild(tag);
      }
    });
  }

  // Create player
  async function initPlayer() {
    await loadYouTubeAPI();

    player = new YT.Player("yt", {
      videoId: id,
      playerVars: {
        autoplay: 0,
        mute: 1,               // REQUIRED for autoplay
        loop: 1,
        playlist: id,
        controls: 0,
        disablekb: 1,
        fs: 0,
        modestbranding: 1,
        rel: 0
      },
      events: {
        onReady: () => {
          playerReady = true;
          if (startRequested) startVideo();
        }
      }
    });
  }

  function startVideo() {
    if (!playerReady) return;

    player.playVideo();

    // Optional: unmute after start
    setTimeout(() => {
      try { player.unMute(); } catch(e) {}
    }, 500);

    document.getElementById("player-wrap").classList.add("visible");
    document.getElementById("shield").style.display = "block";

    const screen = document.getElementById("start-screen");
    screen.classList.add("hidden");
    setTimeout(() => screen.remove(), 800);
  }

  // Click handler
  document.getElementById("start-screen").addEventListener("click", () => {
    startRequested = true;
    startVideo();
  });

  // Resize to cover screen
  const RATIO = 16 / 9;

  function resize() {
    const sw = window.innerWidth;
    const sh = window.innerHeight;
    const screenRatio = sw / sh;

    let w, h;
    if (screenRatio > RATIO) {
      w = sw;
      h = sw / RATIO;
    } else {
      h = sh;
      w = sh * RATIO;
    }

    const wrap = document.getElementById("player-wrap");
    wrap.style.width = w + "px";
    wrap.style.height = h + "px";
  }

  resize();
  window.addEventListener("resize", resize);

  // Init
  initPlayer();
</script>

</body>
</html>
