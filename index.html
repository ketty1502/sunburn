<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch</title>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
  }

  #video {
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:100vw;
    height:100vh;
    pointer-events:none;
    opacity:0;
    transition:opacity 0.8s;
  }

  #video.visible {
    opacity:1;
  }

  iframe {
    width:100%;
    height:100%;
    border:none;
  }

  #start {
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    cursor:pointer;
    z-index:10;
  }

  #btn {
    width:80px;
    height:80px;
    border-radius:50%;
    border:2px solid #fff;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  svg {
    width:28px;
    height:28px;
    fill:#fff;
    margin-left:5px;
  }
</style>
</head>

<body>

<div id="video">
  <iframe id="frame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<div id="start">
  <div id="btn">
    <svg viewBox="0 0 24 24">
      <polygon points="6,3 20,12 6,21"/>
    </svg>
  </div>
</div>

<script>
const VIDEO_ID = "SsarK4y9eiI";

document.getElementById("start").addEventListener("click", () => {

  const iframe = document.getElementById("frame");

  // DIRECT autoplay URL (this is the key fix)
  iframe.src =
    "https://www.youtube.com/embed/" + VIDEO_ID +
    "?autoplay=1&mute=1&loop=1&playlist=" + VIDEO_ID +
    "&controls=0&modestbranding=1&rel=0";

  document.getElementById("video").classList.add("visible");

  // remove start screen
  const s = document.getElementById("start");
  s.style.opacity = "0";
  setTimeout(() => s.remove(), 800);
});
</script>

</body>
</html>
