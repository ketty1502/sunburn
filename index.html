<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* ── Video layer ── */
    #player-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #player-wrap.visible {
      opacity: 1;
    }

    #player-wrap iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none;
    }

    /* ── Invisible shield over iframe ── */
    #shield {
      position: fixed;
      inset: 0;
      z-index: 10;
      background: transparent;
      display: none;
    }

    /* ── Start screen ── */
    #start-screen {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      cursor: pointer;
      transition: opacity 0.8s ease;
    }

    #start-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Play button */
    #play-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, transform 0.2s;
    }

    #start-screen:hover #play-btn {
      border-color: #fff;
      transform: scale(1.08);
    }

    #play-btn svg {
      width: 28px;
      height: 28px;
      fill: #fff;
      margin-left: 5px;
    }
  </style>
</head>
<body>

<!-- Video -->
<div id="player-wrap">
  <iframe id="yt" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<div id="shield"></div>

<!-- Start overlay -->
<div id="start-screen">
  <div id="play-btn">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <polygon points="6,3 20,12 6,21"/>
    </svg>
  </div>
</div>

<script>
  // ─── YOUR VIDEO IDs HERE ───────────────────────────────────────────────────
  const VIDEO_IDS = [
    "SsarK4y9eiI",
  ];
  // ──────────────────────────────────────────────────────────────────────────

  const id = VIDEO_IDS[Math.floor(Math.random() * VIDEO_IDS.length)];

  // Load YouTube API
  const tag = document.createElement("script");
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  let player;
  let playerReady = false;
  let startRequested = false;

  window.onYouTubeIframeAPIReady = function () {
    player = new YT.Player("yt", {
      videoId: id,
      playerVars: {
        autoplay: 0,
        loop: 1,
        playlist: id,
        controls: 0,
        disablekb: 1,
        fs: 0,
        iv_load_policy: 3,
        modestbranding: 1,
        rel: 0,
        showinfo: 0,
      },
      events: {
        onReady: () => {
          playerReady = true;
          if (startRequested) beginPlayback();
        },
      },
    });
  };

  function beginPlayback() {
    player.playVideo();
    document.getElementById("player-wrap").classList.add("visible");
    document.getElementById("shield").style.display = "block";

    const screen = document.getElementById("start-screen");
    screen.classList.add("hidden");
    setTimeout(() => screen.remove(), 900);
  }

  document.getElementById("start-screen").addEventListener("click", () => {
    startRequested = true;
    if (playerReady) beginPlayback();
  });

  // ── Cover-fill sizing ────────────────────────────────────────────────────
  const NATIVE_RATIO = 16 / 9;

  function resize() {
    const sw = window.innerWidth;
    const sh = window.innerHeight;
    const screenRatio = sw / sh;

    let w, h;
    if (screenRatio > NATIVE_RATIO) {
      w = sw;
      h = sw / NATIVE_RATIO;
    } else {
      h = sh;
      w = sh * NATIVE_RATIO;
    }

    const wrap = document.getElementById("player-wrap");
    wrap.style.width  = w + "px";
    wrap.style.height = h + "px";
  }

  resize();
  window.addEventListener("resize", resize);
</script>
</body>
</html>
